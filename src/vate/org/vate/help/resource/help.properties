client.*vtaudiolink:\
\u000AVT>Help about command:*VTAUDIOLINK\
\u000AVT>Alternative:*VTAL\
\u000AVT>Syntax:*VTAUDIOLINK [SIDE/TYPE/MIXER] [...]\
\u000AVT>Details:Toggle remote audio link\
\u000AVT>If remote audio link is already running, it will stop\
\u000AVT>When used, the parameters SIDE TYPE and MIXER defines specific audio mixers\
\u000AVT>The SIDE parameter must be local(L) or remote(R)\
\u000AVT>If SIDE parameter is local(L), the audio mixer is in client\
\u000AVT>If SIDE parameter is remote(R), the audio mixer is in server\
\u000AVT>The TYPE parameter must be input(I) or output(O)\
\u000AVT>If TYPE parameter is input(I), the audio mixer is for input/recording\
\u000AVT>If TYPE parameter is output(O), the audio mixer is for output/playback\
\u000AVT>The MIXER parameter must be an audio mixer number in server or client\
\u000AVT>The parameters SIDE TYPE and MIXER can be used multiple times\
\u000AVT>If a specific audio mixer is omitted, the default audio mixer will be used\
\u000AVT>End of help about command:*VTAUDIOLINK\
\u000AVT>

client.*vtal:\
\u000AVT>Help about command:*VTAL\
\u000AVT>Alternative:*VTAUDIOLINK\
\u000AVT>Syntax:*VTAL [SD/TP/MX] [.]\
\u000AVT>Details:Toggle remote audio link\
\u000AVT>If remote audio link is already running, it will stop\
\u000AVT>When used, the parameters SD TP and MX defines specific audio mixers\
\u000AVT>The SD parameter must be local(L) or remote(R)\
\u000AVT>If SD parameter is local(L), the audio mixer is in client\
\u000AVT>If SD parameter is remote(R), the audio mixer is in server\
\u000AVT>The TP parameter must be input(I) or output(O)\
\u000AVT>If TP parameter is input(I), the audio mixer is for input/recording\
\u000AVT>If TP parameter is output(O), the audio mixer is for output/playback\
\u000AVT>The MX parameter must be a audio mixer number in server or client\
\u000AVT>The parameters SD TP and MX can be used multiple times\
\u000AVT>If a specific audio mixer is omitted, the default audio mixer will be used\
\u000AVT>End of help about command:*VTAL\
\u000AVT>

client.*vttcptunnel:\
\u000AVT>Help about command:*VTTCPTUNNEL\
\u000AVT>Alternative:*VTTCPTN\
\u000AVT>Syntax:*VTTCPTUNNEL [SIDE] [[BIND] PORT] [[HOST] PORT]\
\u000AVT>Details:Set/remove connection TCP tunnels between client and server\
\u000AVT>Without any parameters, show current connection TCP tunnels\
\u000AVT>If used, the SIDE parameter must be local(L) or remote (R)\
\u000AVT>If SIDE parameter is local(L), bind the tunnel in a client network port\
\u000AVT>If SIDE parameter is remote(R), bind the tunnel in a server network port\
\u000AVT>If used, the BIND parameter be the network bind address of the tunnel\
\u000AVT>The first PORT parameter must be the network bind port of the tunnel\
\u000AVT>Without [HOST] PORT parameter, remove tunnel bound in [BIND] PORT parameter\
\u000AVT>The HOST parameter must be the network redirect address of the tunnel\
\u000AVT>The second PORT parameter must be the network redirect port of the tunnel\
\u000AVT>If SIDE parameter is local(L), the tunnel redirects to server network\
\u000AVT>If SIDE parameter is remote(R), the tunnel redirects to client network\
\u000AVT>End of help about command:*VTTCPTUNNEL\
\u000AVT>

client.*vttcptn:\
\u000AVT>Help about command:*VTTCPTN\
\u000AVT>Alternative:*VTTCPTUNNEL\
\u000AVT>Syntax:*VTTCPTN [SD] [[BD] PT] [[HT] PT]\
\u000AVT>Details:Set/remove connection TCP tunnels between client and server\
\u000AVT>Without any parameters, show current connection TCP tunnels\
\u000AVT>If used, the SD parameter must be local(L) or remote (R)\
\u000AVT>If SD parameter is local(L), bind the tunnel in a client network port\
\u000AVT>If SD parameter is remote(R), bind the tunnel in a server network port\
\u000AVT>If used, the BD parameter be the network bind address of the tunnel\
\u000AVT>The first PT parameter must be the network bind port of the tunnel\
\u000AVT>Without [HT] PT parameter, remove tunnel bound in [BD] PT parameter\
\u000AVT>The HT parameter must be the network redirect address of the tunnel\
\u000AVT>The second PT parameter must be the network redirect port of the tunnel\
\u000AVT>If SD parameter is local(L), the tunnel redirects to server network\
\u000AVT>If SD parameter is remote(R), the tunnel redirects to client network\
\u000AVT>End of help about command:*VTTCPTN\
\u000AVT>

client.*vtprintdata:\
\u000AVT>Help about command:*VTPRINTDATA\
\u000AVT>Alternative:*VTPRDT\
\u000AVT>Syntax:*VTPRINTDATA [MODE] [DATA] [PRINTER]\
\u000AVT>Details:Print data on a print service in server\
\u000AVT>The MODE parameter is the print mode and can be:\
\u000AVT>text(T), use data as text\
\u000AVT>file(F), use data as file and can be a URL, format support varies\
\u000AVT>unicode(U), use data as UTF-8 text file\
\u000AVT>native(N), use data as native text file\
\u000AVT>stop(S), stop current print task\
\u000AVT>Without the MODE parameter, check current print task status\
\u000AVT>The DATA parameter is the print data\
\u000AVT>If used, the PRINTER parameter must be a print service number\
\u000AVT>Without the PRINTER parameter, use default print service\
\u000AVT>End of help about command:*VTPRINTDATA\
\u000AVT>

client.*vtprdt:\
\u000AVT>Help about command:*VTPRDT\
\u000AVT>Alternative:*VTPRINTDATA\
\u000AVT>Syntax:*VTPRDT [MD] [DT] [PR]\
\u000AVT>Details:Print data on a print service in server\
\u000AVT>The MD parameter is the print mode and can be:\
\u000AVT>text(T), use data as text\
\u000AVT>file(F), use data as file and can be a URL, format support varies\
\u000AVT>unicode(U), use data as UTF-8 text file\
\u000AVT>native(N), use data as native text file\
\u000AVT>stop(S), stop current print task\
\u000AVT>Without the MODE parameter, check current print task status\
\u000AVT>The DT parameter is the print data\
\u000AVT>If used, the PR parameter must be a print service number\
\u000AVT>Without the PR parameter, use default print service\
\u000AVT>End of help about command:*VTPRDT\
\u000AVT>

