main.client:\
\u000AVT>List of available internal commands in the client console:\
\u000AVT>*VTHELP [COMMAND]|*VTTIME|*VTCLEAR|*VTECHO|*VTDISCONNECT|*VTQUIT|*VTSTOP|\
\u000AVT>*VTCHAINS|*VTSESSIONS|*VTMESSAGE <MESSAGE>|*VTCOVER|*VTSHELL <OPTIONS>|\
\u000AVT>*VTVARIABLE [NAME] [VALUE]|*VTPROPERTY [NAME] [VALUE]|*VTRUNTIME <COMMAND>|\
\u000AVT>*VTFILETRANSFER [MODE] [SOURCE TARGET]|*VTFILEINSPECT [MODE] [FILE]|\
\u000AVT>*VTFILEMODIFY [MODE] [FILE] [NEXT]|*VTZIP <SIDE> [MODE] [ZIP FILES]|\
\u000AVT>*VTDISPLAYS|*VTSCREENSHOT [MODE] [DISPLAY]|*VTGRAPHICSLINK [MODE]|\
\u000AVT>*VTSCREENALERT <[TITLE/]ALERT> [DISPLAY]|*VTBROWSE <URI>|*VTPRINTRUN <FILE>|\
\u000AVT>*VTAUDIOMIXERS [SIDE]|*VTAUDIOLINK [SIDE/TYPE/MIXER] [...]|*VTBELL|\
\u000AVT>*VTBEEP <FREQUENCY TIME>|*VTNETWORKS|*VTRESOLVEHOST <HOST>|*VTPING|\
\u000AVT>*VTRATELIMIT [RATE] [SENSE]|*VTTCPTUNNEL [SIDE] [[BIND] PORT] [[HOST] PORT]|\
\u000AVT>*VTSOCKSTUNNEL [SIDE] [[BIND] PORT] [USERNAME PASSWORD]|*VTPRINTERS [ORDER]|\
\u000AVT>*VTPRINTDATA [MODE] [DATA] [PRINTER]|*VTOPTICALDRIVE <MODE>|\
\u000AVT>*VTACCESS [NAME] [VALUE]|*VTLOCK <LOGIN> <PASSWORD>|*VTSAVE [FILE]|\
\u000AVT>Enter *VTHELP [COMMAND] for more details about a specific internal command\
\u000AVT>Other commands are redirected to the remote shell\
\u000AVT>Separate commands with *; to issue multiple commands in the same line\
\u000AVT>

min.client:\
\u000AVT>List of available internal commands in the client console:\
\u000AVT>*VTHLP [CMD]|*VTTM|*VTCLR|*VTEC|*VTDSCT|*VTQT|*VTSTP|*VTCNS|*VTSNS|\
\u000AVT>*VTMSG <MSG>|*VTCV|*VTSH <OP>|VTVAR [NM] [VL]|*VTPROP [NM] [VL]|\
\u000AVT>*VTRT <CMD>|*VTFT [MD] [SRC TGT]|*VTFI [MD] [FL]|*VTFM [MD] [FL] [NX]|\
\u000AVT>*VTZP <SD> [MD] [ZP FL]|*VTDPS|*VTSCS [MD] [DP]|*VTGL [MD]|\
\u000AVT>*VTSA <[TI/]ALT> [DP]|*VTBRWS <URI>|*VTPRRN <FL>|*VTAM [SD]|\
\u000AVT>*VTAL [SD/TP/MX] [.]|*VTBL|*VTBP <FQ TM>|*VTNTS|*VTRHT <HT>|*VTPG|\
\u000AVT>*VTRL [RT] [SE]|*VTTCPTN [SD] [[BD] PT] [[HT] PT]|\
\u000AVT>*VTSCKTN [SD] [[BD] PT] [UN PW]|*VTPRTS [OR]|*VTPRDT [MD] [DT] [PR]|\
\u000AVT>*VTOPDR <MD>|*VTAC [NM] [VL]|*VTLK <LGN PW>|*VTSV [FL]|\
\u000AVT>Enter *VTHLP [CMD] for more details about a specific internal command\
\u000AVT>Other commands are redirected to the remote shell\
\u000AVT>Separate commands with *; to issue multiple commands in the same line\
\u000AVT>

client.*vtsave:\
\u000AVT>Help about command:*VTSAVE\
\u000AVT>Alternative:*VTSV\
\u000AVT>Syntax:*VTSAVE [FILE]\
\u000AVT>Details:Save current client connection settings in file\
\u000AVT>If used, the FILE parameter is the client connection settings file path\
\u000AVT>Without the FILE parameter, file path is variable-terminal-client.properties\
\u000AVT>End of help about command:*VTSAVE\
\u000AVT>

client.*vtsv:\
\u000AVT>Help about command:*VTSV\
\u000AVT>Alternative:*VTSAVE\
\u000AVT>Syntax:*VTSV [FL]\
\u000AVT>Details:Save current client connection settings in file\
\u000AVT>If used, the FL parameter is the client connection settings file path\
\u000AVT>Without the FL parameter, file path is variable-terminal-client.properties\
\u000AVT>End of help about command:*VTSV\
\u000AVT>

client.*vtaccess:\
\u000AVT>Help about command:*VTACCESS\
\u000AVT>Alternative:*VTAC\
\u000AVT>Syntax:*VTACCESS [NAME] [VALUE]\
\u000AVT>Details:Set/show server access settings\
\u000AVT>The NAME parameter is the server access setting name\
\u000AVT>The VALUE parameter is the server access setting value\
\u000AVT>With NAME as CM set/show connection mode(passive or active)\
\u000AVT>With NAME as CH set/show connection host address\
\u000AVT>With NAME as CP set/show connection host port\
\u000AVT>With NAME as NP set/show connection nat port\
\u000AVT>With NAME as PT set/show proxy type(none, HTTP or SOCKS)\
\u000AVT>With NAME as PH set/show proxy host address\
\u000AVT>With NAME as PP set/show proxy host port\
\u000AVT>With NAME as PA set/show proxy authentication(disabled or enabled)\
\u000AVT>With NAME as PU set/show proxy user\
\u000AVT>With NAME as PK set/show proxy password\
\u000AVT>With NAME as ET set/show encryption type(none, RC4 or AES)\
\u000AVT>With NAME as EK set/show encryption password\
\u000AVT>With NAME as SL set/show sessions limit\
\u000AVT>With NAME as SF save server access settings in text file\
\u000AVT>With NAME as LF load server access settings from text file\
\u000AVT>End of help about command:*VTACCESS\
\u000AVT>

client.*vtac:\
\u000AVT>Help about command:*VTAC\
\u000AVT>Alternative:*VTACCESS\
\u000AVT>Syntax:*VTAC [NM] [VL]\
\u000AVT>Details:Set/show server access settings\
\u000AVT>The NM parameter is the server access setting name\
\u000AVT>The VL parameter is the server access setting value\
\u000AVT>With NM as CM set/show connection mode(passive or active)\
\u000AVT>With NM as CH set/show connection host address\
\u000AVT>With NM as CP set/show connection host port\
\u000AVT>With NM as NP set/show connection nat port\
\u000AVT>With NM as PT set/show proxy type(none, HTTP or SOCKS)\
\u000AVT>With NM as PH set/show proxy host address\
\u000AVT>With NM as PP set/show proxy host port\
\u000AVT>With NM as PA set/show proxy authentication(disabled or enabled)\
\u000AVT>With NM as PU set/show proxy user\
\u000AVT>With NM as PK set/show proxy password\
\u000AVT>With NM as ET set/show encryption type(none, RC4 or AES)\
\u000AVT>With NM as EK set/show encryption password\
\u000AVT>With NM as SL set/show sessions limit\
\u000AVT>With NM as SF save server access settings in text file\
\u000AVT>With NM as LF load server access settings from text file\
\u000AVT>End of help about command:*VTAC\
\u000AVT>

client.*vtfileinspect:\
\u000AVT>Help about command:*VTFILEINSPECT\
\u000AVT>Alternative:*VTFI\
\u000AVT>Syntax:*VTFILEINSPECT [MODE] [FILE]\
\u000AVT>Details:Show information about a file/directory on server\
\u000AVT>With the MODE parameter as information(I), describe a file/directory\
\u000AVT>With the MODE parameter as list(L), list files of a directory\
\u000AVT>With the MODE parameter as stop(S), stop current file inspection running\
\u000AVT>The FILE parameter must be a absolute path of a file/directory on the\
\u000AVT>server to be inspected\
\u000AVT>Without the MODE and FILE parameters check if file inspection is running\
\u000AVT>End of help about command:*VTFILEINSPECT\
\u000AVT>

client.*vtfi:\
\u000AVT>Help about command:*VTFI\
\u000AVT>Alternative:*VTFILEINSPECT\
\u000AVT>Syntax:*VTFI [MD] [FL]\
\u000AVT>Details:Show information about a file/directory on server\
\u000AVT>With the MD parameter as information(I), describe a file/directory\
\u000AVT>With the MD parameter as list(L), list files of a directory\
\u000AVT>With the MD parameter as stop(S), stop current file inspection running\
\u000AVT>The FL parameter must be a absolute path of a file/directory on the\
\u000AVT>server to be inspected\
\u000AVT>Without the MD and FL parameters, check if file inspection is running\
\u000AVT>End of help about command:*VTFI\
\u000AVT>

client.*vtfilemodify:\
\u000AVT>Help about command:*VTFILEMODIFY\
\u000AVT>Alternative:*VTFM\
\u000AVT>Syntax:*VTFILEMODIFY [MODE] [FILE] [NEXT]\
\u000AVT>Details:Execute modifications on server\
\u000AVT>With the MODE parameter as directory(D), create a empty directory\
\u000AVT>With the MODE parameter as file(F), create a empty data file\
\u000AVT>With the MODE parameter as remove(R), remove a file/directory\
\u000AVT>With the MODE parameter as move(M), move a file/directory to another path\
\u000AVT>With the MODE parameter as copy(C), copy a file/directory to another path\
\u000AVT>With the MODE parameter as stop(S), stop current file modification running\
\u000AVT>The FILE parameter must be a valid absolute path of a file/directory\
\u000AVT>The NEXT parameter is used only in move(M) and copy(C) modes and\
\u000AVT>must be another valid absolute path of a file/directory\
\u000AVT>Without any parameters, check if file modification is running\
\u000AVT>End of help about command:*VTFILEMODIFY\
\u000AVT>

client.*vtfm:\
\u000AVT>Help about command:*VTFM\
\u000AVT>Alternative:*VTFILEMODIFY\
\u000AVT>Syntax:*VTFM [MD] [FL] [NX]\
\u000AVT>Details:Execute modifications on server\
\u000AVT>With the MD parameter as directory(D), create a empty directory\
\u000AVT>With the MD parameter as file(F), create a empty data file\
\u000AVT>With the MD parameter as remove(R), remove a file/directory\
\u000AVT>With the MD parameter as move(M), move a file/directory to another path\
\u000AVT>With the MD parameter as copy(C), copy a file/directory to another path\
\u000AVT>With the MD parameter as stop(S), stop current file modification running\
\u000AVT>The FL parameter must be a valid absolute path of a file/directory\
\u000AVT>The NX parameter is used only in move(M) and copy(C) modes and\
\u000AVT>must be another valid absolute path of a file/directory\
\u000AVT>Without any parameters, check if file modification is running\
\u000AVT>End of help about command:*VTFM\
\u000AVT>

