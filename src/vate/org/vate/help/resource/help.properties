client.*vtscreenshot:\
\u000AVT>Help about command:*VTSCREENSHOT\
\u000AVT>Alternative:*VTSCS\
\u000AVT>Syntax:*VTSCREENSHOT [MODE] [DISPLAY]\
\u000AVT>Details:Capture screenshot on server and save image as PNG file\
\u000AVT>The MODE parameter can include multiple letters as options:\
\u000AVT>With the MODE parameter with show(S), draw pointer location on screenshot\
\u000AVT>With the MODE parameter with clean(C), hide pointer location on screenshot\
\u000AVT>With the MODE parameter with best(B), use 24-bit, 16777216 colors quality\
\u000AVT>With the MODE parameter with high(H), use 15-bit, 32768 colors quality\
\u000AVT>With the MODE parameter with medium(M), use 8-bit, 216 colors quality\
\u000AVT>With the MODE parameter with low(L), use 6-bit, 64 colors quality\
\u000AVT>With the MODE parameter with worst(W), use 4-bit, 16 colors quality\
\u000AVT>If used, the DISPLAY parameter must be a graphical display device number\
\u000AVT>Without the DISPLAY parameter, use default graphical display device\
\u000AVT>With the DISPLAY parameter as -1, unify all available display devices\
\u000AVT>End of help about command:*VTSCREENSHOT\
\u000AVT>

client.*vtscs:\
\u000AVT>Help about command:*VTSCS\
\u000AVT>Alternative:*VTSCREENSHOT\
\u000AVT>Syntax:*VTSCS [MD] [DP]\
\u000AVT>Details:Capture screenshot on server and save image as PNG file\
\u000AVT>The MD parameter can include multiple letters as options:\
\u000AVT>With the MD parameter with show(S), draw pointer location on screenshot\
\u000AVT>With the MD parameter with clean(C), hide pointer location on screenshot\
\u000AVT>With the MD parameter with best(B), use 24-bit, 16777216 colors quality\
\u000AVT>With the MD parameter with high(H), use 15-bit, 32768 colors quality\
\u000AVT>With the MD parameter with medium(M), use 8-bit, 216 colors quality\
\u000AVT>With the MD parameter with low(L), use 6-bit, 64 colors quality\
\u000AVT>With the MD parameter with worst(W), use 4-bit, 16 colors quality\
\u000AVT>If used, the DP parameter must be a graphical display device number\
\u000AVT>Without the DP parameter, use default graphical display device\
\u000AVT>With the DP parameter as -1, unify all available display devices\
\u000AVT>End of help about command:*VTSCS\
\u000AVT>

client.*vtzip:\
\u000AVT>Help about command:*VTZIP\
\u000AVT>Alternative:*VTZP\
\u000AVT>Syntax:*VTZIP <SIDE> [MODE] [ZIP FILES]\
\u000AVT>Details:Manipulate zip files on server/client\
\u000AVT>The SIDE parameter must be remote(R) or local(L)\
\u000AVT>With the MODE parameter as compress(C), create compressed zip file\
\u000AVT>With the MODE parameter as uncompress(U), create uncompressed zip file\
\u000AVT>With the MODE parameter as decompress(D), decompress zip file\
\u000AVT>With the MODE parameter as stop(S), stop zip operation\
\u000AVT>Without the MODE parameter, check if zip file operation is running\
\u000AVT>If used, the ZIP parameter must be a absolute path of a zip file\
\u000AVT>If used, the FILES parameter must be a colon-separated list of absolute\
\u000AVT>file paths to be compressed to zip file or decompressed from zip file\
\u000AVT>End of help about command:*VTZIP\
\u000AVT>

client.*vtzp:\
\u000AVT>Help about command:*VTZP\
\u000AVT>Alternative:*VTZIP\
\u000AVT>Syntax:*VTZP <SD> [MD] [ZP FL]\
\u000AVT>Details:Manipulate zip files on server/client\
\u000AVT>The SD parameter must be remote(R) or local(L)\
\u000AVT>With the MD parameter as compress(C), create compressed zip file\
\u000AVT>With the MD parameter as uncompress(U), create uncompressed zip file\
\u000AVT>With the MD parameter as decompress(D), decompress zip file\
\u000AVT>With the MD parameter as stop(S), stop zip operation\
\u000AVT>Without the MD parameter, check if zip file operation is running\
\u000AVT>If used, the ZP parameter must be a absolute path of a zip file\
\u000AVT>If used, the FL parameter must be a colon-separated list of absolute\
\u000AVT>file paths to be compressed to zip file or decompressed from zip file\
\u000AVT>End of help about command:*VTZP\
\u000AVT>

client.*vtruntime:\
\u000AVT>Help about command:*VTRUNTIME\
\u000AVT>Alternative:*VTRT\
\u000AVT>Syntax:*VTRUNTIME <COMMAND> [...]\
\u000AVT>Details:Manage some native processes on server\
\u000AVT>Possibilities for letter parameters in the COMMAND parameter:\
\u000AVT>Main command letters, must choose only one:\
\u000AVT>(M):Create a managed process in list, process options letters optional\
\u000AVT>(F):Create a free process out of list, process options letters optional\
\u000AVT>(L):List managed processes, process scope letter needed\
\u000AVT>(S):Stop managed processes, process scope letter needed\
\u000AVT>(D):Delete managed processes, process scope letter needed\
\u000AVT>(I):Send text input to managed processes, process scope letter needed\
\u000AVT>(N):Send text line to managed processes, process scope letter needed\
\u000AVT>(B):Send base64 data to managed processes, process scope letter needed\
\u000AVT>(U):Send unicode UTF-8 to managed processes, process scope letter needed\
\u000AVT>(P):Show or change runtime path directory, no support for option letters\
\u000AVT>Process options letters: (V):verbose, (R):restart, (T):timeout\
\u000AVT>Process scope letters: (A):all, (C):command, (O):order number\
\u000AVT>End of help about command:*VTRUNTIME\
\u000AVT>

