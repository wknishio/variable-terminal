client.*vtgraphicslink:\
\u000AVT>Help about command:*VTGRAPHICSLINK\
\u000AVT>Alternative:*VTGL\
\u000AVT>Syntax:*VTGRAPHICSLINK [MODE]\
\u000AVT>Details:Toggle remote graphics link\
\u000AVT>Without the MODE parameter, start in control mode or stop if its running\
\u000AVT>With the MODE parameter as view(V), set graphics link in view mode\
\u000AVT>With the MODE parameter as control(C), set graphics link in control mode\
\u000AVT>Interface shortcuts:\
\u000AVT>"Ctrl"+"Shift"+"Alt":Toggle remote control\
\u000AVT>"Ctrl"+"Shift"+"Space":Toggle interface refresh\
\u000AVT>"Ctrl"+"Shift"+"Backspace":Toggle menu bar\
\u000AVT>"Ctrl"+"Shift"+"Enter":Toggle full screen mode\
\u000AVT>"Ctrl"+"Shift"+"PageDown":Decrease image scale\
\u000AVT>"Ctrl"+"Shift"+"PageUp":Increase image scale\
\u000AVT>"Ctrl"+"Shift"+"Insert":Reset image scale\
\u000AVT>"Ctrl"+"Shift"+"Home":Use previous display device\
\u000AVT>"Ctrl"+"Shift"+"End":Use next display device\
\u000AVT>End of help about command:*VTGRAPHICSLINK\
\u000AVT>

