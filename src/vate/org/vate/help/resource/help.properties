\u000AVT>*VTPRTS|*VTAC [NM] [VL]|*VTLK <LGN PW>|\
\u000AVT>End of server console commands list\
\u000AVT>Enter *VTHLP CMD for more details about a specific internal command\
\u000AVT>Separate commands with *; to issue multiple commands in the same line\
\u000AVT>Other commands are ignored\
\u000AVT>

server.*vtaccess:\
\u000AVT>Help about command:*VTACCESS\
\u000AVT>Alternative:*VTAC\
\u000AVT>Syntax:*VTACCESS [NAME] [VALUE]\
\u000AVT>Details:Set/show server access settings\
\u000AVT>The NAME parameter is the server access setting name\
\u000AVT>The VALUE parameter is the server access setting value\
\u000AVT>With NAME as CM set/show connection mode(passive or active)\
\u000AVT>With NAME as CH set/show connection host address\
\u000AVT>With NAME as CP set/show connection host port\
\u000AVT>With NAME as NP set/show connection nat port\
\u000AVT>With NAME as PT set/show proxy type(none, HTTP or SOCKS)\
\u000AVT>With NAME as PH set/show proxy host address\
\u000AVT>With NAME as PP set/show proxy host port\
\u000AVT>With NAME as PA set/show proxy authentication(disabled or enabled)\
\u000AVT>With NAME as PU set/show proxy user\
\u000AVT>With NAME as PK set/show proxy password\
\u000AVT>With NAME as ET set/show encryption type(none, RC4 or AES)\
\u000AVT>With NAME as EK set/show encryption password\
\u000AVT>With NAME as SL set/show sessions limit\
\u000AVT>With NAME as SF save server access settings in text file\
\u000AVT>With NAME as LF load server access settings from text file\
\u000AVT>End of help about command:*VTACCESS\
\u000AVT> 

