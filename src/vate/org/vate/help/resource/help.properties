\u000AVT>(D):Delete managed processes, process scope letter needed\
\u000AVT>(I):Send text input to managed processes, process scope letter needed\
\u000AVT>(N):Send text line to managed processes, process scope letter needed\
\u000AVT>(B):Send base64 data to managed processes, process scope letter needed\
\u000AVT>(U):Send unicode UTF-8 to managed processes, process scope letter needed\
\u000AVT>(P):Show or change runtime path directory, no support for option letters\
\u000AVT>Process options letters: (V):verbose, (R):restart, (T):timeout\
\u000AVT>Process scope letters: (A):all, (C):command, (O):order number\
\u000AVT>End of help about command:*VTRT\
\u000AVT>

client.*vtbeep:\
\u000AVT>Help about command:*VTBEEP\
\u000AVT>Alternative:*VTBP\
\u000AVT>Syntax:*VTBEEP <FREQUENCY TIME>\
\u000AVT>Details:Make noises on server using speakers\
\u000AVT>The FREQUENCY parameter is the frequency and must be in hertz\
\u000AVT>The TIME parameter is the duration and must be in milliseconds\
\u000AVT>End of help about command:*VTBEEP\
\u000AVT>

client.*vtbp:\
\u000AVT>Help about command:*VTBP\
\u000AVT>Alternative:*VTBEEP\
\u000AVT>Syntax:*VTBP <FQ TM>\
\u000AVT>Details:Make noises on server using speakers\
\u000AVT>The FQ parameter is the frequency must be in hertz\
\u000AVT>The TM parameter is the duration and must be in milliseconds\
\u000AVT>End of help about command:*VTBP\
\u000AVT>

client.*vtfiletransfer:\
\u000AVT>Help about command:*VTFILETRANSFER\
\u000AVT>Alternative:*VTFT\
\u000AVT>Syntax:*VTFILETRANSFER [MODE] [SOURCE TARGET]\
\u000AVT>Details:Transfer files to/from server\
\u000AVT>With the MODE parameter as get(G), transfer files from server to client\
\u000AVT>With the MODE parameter as put(P), transfer files from client to server\
\u000AVT>With the MODE parameter as stop(S), stop file transfer\
\u000AVT>Without the MODE parameter, check if file transfer is running\
\u000AVT>The MODE parameter can also contain the following letters as options:\
\u000AVT>(C) for compression, (R) for resume and (V) for verification\
\u000AVT>The parameters SOURCE and TARGET must be absolute file paths\
\u000AVT>The SOURCE parameter supports multiple file paths separated by ";"\
\u000AVT>End of help about command:*VTFILETRANSFER\
\u000AVT>

client.*vtft:\
\u000AVT>Help about command:*VTFT\
\u000AVT>Alternative:*VTFILETRANSFER\
\u000AVT>Syntax:*VTFT [MD] [SRC TGT]\
\u000AVT>Details:Transfer files to/from server\
\u000AVT>With the MD parameter as get(G), transfer files from server to client\
\u000AVT>With the MD parameter as put(P), transfer files from client to server\
\u000AVT>With the MD parameter as stop(S), stop file transfer\
\u000AVT>Without the MD parameter, check if file transfer is running\
\u000AVT>The MD parameter can also contain the following letters as options:\
\u000AVT>(C) for compression, (R) for resume and (V) for verification\
\u000AVT>The parameters SRC and TGT must be absolute file paths\
\u000AVT>The SRC parameter supports multiple file paths separated by ";"\
\u000AVT>End of help about command:*VTFT\
\u000AVT>

client.*vtaudiomixers:\
\u000AVT>Help about command:*VTAUDIOMIXERS\
\u000AVT>Alternative:*VTAM\
\u000AVT>Syntax:*VTAUDIOMIXERS [SIDE]\
\u000AVT>Details:Show details about all audio mixers on client and/or server\
\u000AVT>Without the SIDE parameter, show audio mixers in client and server\
\u000AVT>If used, the SIDE parameter must be local(L) or remote(R)\
\u000AVT>If SIDE parameter is local(L), show audio mixers on client\
\u000AVT>If SIDE parameter is remote(R), show audio mixers on server\
\u000AVT>End of help about command:*VTAUDIOMIXERS\
\u000AVT>

client.*vtam:\
\u000AVT>Help about command:*VTAM\
\u000AVT>Alternative:*VTAUDIOMIXERS\
\u000AVT>Syntax:*VTAM [SD]\
\u000AVT>Details:Show details about all audio mixers on client and/or server\
\u000AVT>Without the SD parameter, show audio mixers in client and server\
\u000AVT>If used, the SD parameter must be local(L) or remote(R)\
\u000AVT>If SD parameter is local(L), show audio mixers on client\
\u000AVT>If SD parameter is remote(R), show audio mixers on server\
\u000AVT>End of help about command:*VTAM\
\u000AVT>

client.*vtratelimit:\
\u000AVT>Help about command:*VTRATELIMIT\
\u000AVT>Alternative:*VTRL\
\u000AVT>Syntax:*VTRATELIMIT [RATE] [SENSE]\
\u000AVT>Details:Set/show the connection rate limits between client and server\
\u000AVT>Without any parameters, show upload and download connection rate limits\
\u000AVT>If used, the RATE parameter must be the connection rate limit in\
\u000AVT>bytes per second, or 0 can be used to set unlimited rate limit\
\u000AVT>Without the SENSE parameter, set both download and upload rate limits\
\u000AVT>With the SENSE parameter as download(D), set download rate limit\
\u000AVT>With the SENSE parameter as upload(D), set upload rate limit\
\u000AVT>End of help about command:*VTRATELIMIT\
\u000AVT>

client.*vtrl:\
\u000AVT>Help about command:*VTRL\
\u000AVT>Alternative:*VTRATELIMIT\
\u000AVT>Syntax:*VTRL [RT] [SE]\
\u000AVT>Details:Set/show the connection rate limit between client and server\
\u000AVT>Without any parameters, show upload and download connection rate limit\
\u000AVT>If used, the RT parameter must be the connection rate limit in\
\u000AVT>bytes per second, or 0 can be used to set unlimited rate limit\
\u000AVT>Without the SE parameter, set both download and upload rate limit\
\u000AVT>With the SE parameter as download(D), set download rate limit\
\u000AVT>With the SE parameter as upload(D), set upload rate limit\
\u000AVT>End of help about command:*VTRL\
\u000AVT>

