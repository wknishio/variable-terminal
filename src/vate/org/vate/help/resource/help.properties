client.*vtscreenalert:\
\u000AVT>Help about command:*VTSCREENALERT\
\u000AVT>Alternative:*VTSA\
\u000AVT>Syntax:*VTSCREENALERT <ALERT[/TITLE]> [DISPLAY]\
\u000AVT>Details:Shows a graphical screen alert message in server\
\u000AVT>The ALERT parameter is the message and can be any text\
\u000AVT>The TITLE parameter is the title and can be any text\
\u000AVT>If used, the DISPLAY parameter must be a graphical display device number\
\u000AVT>Without the DISPLAY parameter, use default graphical display device\
\u000AVT>End of help about command:*VTSCREENALERT\
\u000AVT>

client.*vtsa:\
\u000AVT>Help about command:*VTSA\
\u000AVT>Alternative:*VTSCREENALERT\
\u000AVT>Syntax:*VTSA <ALT[/TI]> [DP]\
\u000AVT>Details:Shows a graphical popup alert message in server\
\u000AVT>The ALT parameter is the message and can be any text\
