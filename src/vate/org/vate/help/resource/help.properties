client.*vtsockstunnel:\
\u000AVT>Help about command:*VTSOCKSTUNNEL\
\u000AVT>Alternative:*VTSCKTN\
\u000AVT>Syntax:*VTSOCKSTUNNEL [SIDE] [[BIND] PORT] [USERNAME PASSWORD]\
\u000AVT>Details:Set/remove connection SOCKS proxy tunnels between client and server\
\u000AVT>Without any parameters, show current connection SOCKS proxy tunnels\
\u000AVT>If used, the SIDE parameter must be local(L) or remote(R)\
\u000AVT>If SIDE parameter is local(L), bind the proxy in a client network port\
\u000AVT>If SIDE parameter is remote(R), bind the proxy in a server network port\
\u000AVT>If used, the BIND parameter be the network bind address of the tunnel\
\u000AVT>The PORT parameter must be the network bind port of the tunnel\
\u000AVT>If used, the USERNAME and PASSWORD parameters set proxy authentication\
\u000AVT>End of help about command:*VTSOCKSTUNNEL\
\u000AVT>

client.*vtscktn:\
\u000AVT>Help about command:*VTSCKTN\
\u000AVT>Alternative:*VTSOCKSTUNNEL\
\u000AVT>Syntax:*VTSCKTN [SD] [[BD] PT] [UN PW]\
\u000AVT>Details:Set/remove connection SOCKS proxy tunnels between client and server\
\u000AVT>Without any parameters, show current connection SOCKS proxy tunnels\
\u000AVT>If used, the SD parameter must be local(L) or remote(R)\
\u000AVT>If SD parameter is local(L), bind the proxy in a client network port\
\u000AVT>If SD parameter is remote(R), bind the proxy in a server network port\
\u000AVT>If used, the BD parameter be the network bind address of the tunnel\
\u000AVT>The PT parameter must be the network bind port of the tunnel\
\u000AVT>If used, the UN and PW parameters set proxy authentication\
\u000AVT>End of help about command:*VTSCKTN\
\u000AVT>

