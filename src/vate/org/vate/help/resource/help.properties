\u000AVT>With NM as PT set/show proxy type(none, HTTP or SOCKS)\
\u000AVT>With NM as PH set/show proxy host address\
\u000AVT>With NM as PP set/show proxy host port\
\u000AVT>With NM as PA set/show proxy authentication(disabled or enabled)\
\u000AVT>With NM as PU set/show proxy user\
\u000AVT>With NM as PK set/show proxy password\
\u000AVT>With NM as ET set/show encryption type(none, RC4 or AES)\
\u000AVT>With NM as EK set/show encryption password\
\u000AVT>With NM as SL set/show sessions limit\
