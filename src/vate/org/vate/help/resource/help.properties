main.server:\
\u000AVT>List of available internal commands in the server console:\
\u000AVT>*VTHELP [COMMAND]|*VTCLEAR|*VTTIME|*VTSTOP|*VTSESSIONS|\
\u000AVT>*VTDISCONNECT [CLIENT]|*VTMESSAGE <MESSAGE>|*VTCOVER|\
\u000AVT>*VTVARIABLE [NAME] [VALUE]|*VTPROPERTY [NAME] [VALUE]|\
\u000AVT>*VTFILEROOTS|*VTDISPLAYS|*VTAUDIOMIXERS|*VTNETWORKS|*VTPING|\
\u000AVT>*VTPRINTERS|*VTACCESS [NAME] [VALUE]|*VTLOCK <LOGIN PASSWORD>|\
\u000AVT>End of server console commands list\
\u000AVT>Enter *VTHELP COMMAND for more details about a specific internal command\
\u000AVT>Separate commands with *; to issue multiple commands in the same line\
\u000AVT>Other commands are ignored\
\u000AVT>

